{% extends 'base.html' %}
{% block content %}
<h2>Create Account</h2>
<form method="post" class="form-card" id="registerForm">
  <select name="role" id="roleSelect" required>
    <option value="user">Register as User</option>
    <option value="worker">Register as Worker</option>
  </select>
  <input name="name" placeholder="Full name" required>
  <input name="email" type="email" placeholder="Email" required>
  <input name="city" placeholder="City" required>
  <input name="password" type="password" placeholder="Password" required>

  <div id="workerFields" class="hidden">
    <select name="service_category">
      {% for c in categories %}<option value="{{ c }}">{{ c.title() }}</option>{% endfor %}
    </select>
    <input name="area" placeholder="Area">
    <input name="phone" placeholder="Phone">
    <div class="two-cols">
      <input name="latitude" placeholder="Latitude (optional)">
      <input name="longitude" placeholder="Longitude (optional)">
    </div>
  </div>

  <button type="submit" class="btn">Register</button>
</form>
<script>
  const roleSelect = document.getElementById('roleSelect');
  const workerFields = document.getElementById('workerFields');
  roleSelect.addEventListener('change', () => {
    workerFields.classList.toggle('hidden', roleSelect.value !== 'worker');
  });
</script>
{% endblock %}
